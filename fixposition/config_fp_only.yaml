/**:
    ros__parameters:
        stream: tcpcli://10.21.31.66:21000
        reconnect_delay: 5.0
        delay_warning: 0.03

        messages:
            - "FP_A-ODOMETRY"
            - "FP_A-ODOMENU"
            - "FP_A-ODOMSH"
            - "FP_A-ODOMSTATUS"
            - "FP_A-IMUBIAS"
            - "FP_A-EOE"
            - "FP_A-TF"
            - "FP_A-RAWIMU"
            - "FP_A-CORRIMU"
            - "FP_A-LLH"
            - "NOV_B-INSPVAX"
            - "FP_A-TEXT"
            - "FP_A-GNSSANT"
            - "FP_A-GNSSCORR"
            - "FP_A-TP"
            - "GGA"
            - "GLL"
            - "GSA"
            - "GST"
            - "GSV"
            - "HDT"
            - "RMC"
            - "VTG"
            - "ZDA"
            - "NOV_B-BESTGNSSPOS"

        fusion_epoch: true
        nmea_epoch: "GNSS"
        raw_output: false
        cov_warning: false
        nav2_mode: true

        converter:
            enabled: true
            topic_type: "Twist"
            input_topic: "/fixposition/motion_info_twist"
            scale_factor: 1000.0
            use_x: true
            use_y: false
            use_z: false

        output_ns: "/fixposition"
        speed_topic: ""
        corr_topic: "/rtcm"
        qos_type: "sensor_short"
