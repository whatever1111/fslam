# Sensor profile: Fixposition GNSS/INS IMU + Livox LiDAR + Fixposition ENU odom.
#
# Declares one input chain consumed by input_adapters.launch.py. Each node picks
# up the section matching its name; the adapters normalize every vendor stream
# to the canonical /lio/* contract (docs/INPUT_ADAPTER_DESIGN.md §4, §7).

imu_adapter:
  ros__parameters:
    driver: fixposition
    input_topic: /fixposition/fpa/rawimu
    bias_topic: /fixposition/fpa/imubias
    output_topic: /lio/imu
    output_frame: base_link
    # FP rawimu is already rad/s, m/s^2 (gravity-included); only de-bias + frame.
    acc_scale: 1.0
    gyro_scale: 1.0
    bias_status_threshold: 2
    # extrinsic_rot / extrinsic_rpy: 9-element row-major (default identity).

lidar_adapter:
  ros__parameters:
    driver: livox
    input_topic: /livox/lidar
    output_topic: /lio/points
    output_frame: base_link
    min_range: 0.5
    max_range: 200.0

odom_adapter:
  ros__parameters:
    driver: fixposition
    input_topic: /fixposition/fpa/odomenu
    output_topic: /lio/gps_odom
    output_frame: map
    base_frame: base_link
    # FpaOdomenu.gnss1_status is the FpaGnssFix enum: 8 = RTK_FIXED, 7 = RTK_FLOAT,
    # 5/4 = mere SPP 3D/2D (the earlier [4, 5] was the CGI-610 GPCHC convention).
    trusted_status: [8]
    trusted_xy_std: 0.02
    trusted_z_std: 0.04
    degraded_xy_std: 1.0
    degraded_z_std: 2.0

twist_adapter:
  ros__parameters:
    driver: fixposition_wheel
    input_topic: /fixposition/speed
    output_topic: /lio/twist
    output_frame: base_link
    location: ""        # empty = first valid WheelSensor
    skip_invalid: true
    speed_scale: 1.0    # residual wheel-radius scale applied downstream
    enforce_nhc: true
