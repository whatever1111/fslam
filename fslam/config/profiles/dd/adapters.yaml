# Sensor profile: DD autocube — Fixposition GNSS/INS IMU + Livox Mid-360 LiDAR.
#
# Matches the DD *recorded* bags (/home/data/dd/**): Livox CustomMsg on
# /livox/points, Fixposition raw IMU, and a plain nav_msgs/Odometry ENU anchor
# on /fixposition/odometry_enu (NOT FpaOdomenu). Same sensors as the live
# `fixposition_livox` rig but the bags carry different topic names + a plain
# Odometry GPS stream, so this is its own profile (cf. giant vs giant_allpoint).
#
# Each node picks up the section matching its name; the adapters normalize every
# vendor stream to the canonical /lio/* contract (docs/INPUT_ADAPTER_DESIGN.md §4, §7).

imu_adapter:
  ros__parameters:
    # Front-end on the Livox Mid-360 BUILT-IN IMU (/livox/imu), NOT the Fixposition
    # IMU. Rationale (validated): the FP IMU is mounted level (base_link) while the
    # LiDAR sits at +20° pitch (tf_static autocube_link→livox_frame rpy=[0,20,0]).
    # Front-ending on the FP IMU therefore needs extrinsic_R to encode that 20° pitch
    # (+ a 90° yaw); a gyro-Kabsch fit got it ≈identity and MISSED the 20°, tilting
    # gravity → 48 m Z runaway in /Odometry → PGO diverged to 80 m. The Livox IMU is
    # CO-HOUSED with the LiDAR (same 20° tilt in both → extrinsic identity, gravity
    # absorbed by FAST-LIO init) AND shares the Livox clock (no 37 s bridge needed).
    # This mirrors the vendor mid360.yaml.
    driver: livox
    input_topic: /livox/imu
    output_topic: /lio/imu
    output_frame: base_link
    # /livox/imu linear_acceleration is in g (|acc|≈1.0 at rest) → ×9.80665 to m/s^2.
    acc_scale: 9.80665
    gyro_scale: 1.0           # already rad/s
    # extrinsic identity: the built-in IMU is axis-aligned with the LiDAR; the
    # LiDAR↔IMU factory offset (translation only) lives in fast_lio.yaml extrinsic_T.

lidar_adapter:
  ros__parameters:
    driver: livox
    input_topic: /livox/points        # Livox Mid-360 CustomMsg (recorded topic name)
    output_topic: /lio/points
    output_frame: base_link
    min_range: 0.3
    max_range: 60.0

odom_adapter:
  ros__parameters:
    # "odometry": plain nav_msgs/Odometry already in ENU (ENU-passthrough core,
    # same as the fixposition driver but a different ROS input message type).
    driver: odometry
    input_topic: /fixposition/odometry_enu
    output_topic: /lio/gps_odom
    output_frame: map
    base_frame: base_link
    # nav_msgs/Odometry carries no RTK status field → stamp a trusted status so the
    # FP ENU solution is bucketed as RTK-fixed. Drop to a non-trusted value to
    # treat it as degraded instead.
    assumed_status: 5
    trusted_status: [5]
    trusted_xy_std: 0.02
    trusted_z_std: 0.04
    degraded_xy_std: 1.0
    degraded_z_std: 2.0

twist_adapter:
  ros__parameters:
    # Only lio_pgo_full_with_twist carries /robot/twist; the base DD bags have no
    # wheel speed (the twist factor is simply absent there — see pgo.yaml note).
    driver: raw_twist                 # plain geometry_msgs/Twist on /robot/twist
    input_topic: /robot/twist
    output_topic: /lio/twist
    output_frame: base_link
    skip_invalid: true
    speed_scale: 1.0
    enforce_nhc: true
